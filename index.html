<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .container { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 560px; border: 1px solid #e5e5e5; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .upload-area { border: 1.5px dashed #d0d0d0; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1rem; transition: border-color 0.2s; }
    .upload-area:hover { border-color: #378ADD; }
    .upload-area input { display: none; }
    .upload-label { font-size: 14px; color: #555; }
    .upload-label span { color: #378ADD; font-weight: 500; cursor: pointer; }
    .filename { font-size: 13px; color: #378ADD; margin-top: 6px; }
    button { width: 100%; padding: 11px; background: #378ADD; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 6px; }
    button:hover { background: #185FA5; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .result { margin-top: 1.5rem; display: none; }
    .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .score-circle { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; }
    .score-label { font-size: 15px; font-weight: 500; }
    .score-sub { font-size: 13px; color: #666; margin-top: 2px; }
    .field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    .field-label { color: #888; }
    .field-val { font-weight: 500; color: #222; max-width: 60%; text-align: right; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .chip { font-size: 11px; padding: 3px 10px; border-radius: 99px; }
    .chip-found { background: #EAF3DE; color: #3B6D11; }
    .chip-miss { background: #FCEBEB; color: #A32D2D; }
    .chip-label { font-size: 12px; color: #888; margin-top: 10px; margin-bottom: 4px; }
    .feedback-box { background: #F8F9FF; border-left: 3px solid #378ADD; border-radius: 0 8px 8px 0; padding: 14px 16px; margin-top: 1rem; font-size: 13px; color: #333; line-height: 1.7; white-space: pre-wrap; }
    .feedback-title { font-size: 12px; font-weight: 600; color: #378ADD; margin-bottom: 8px; }
    .error-box { background: #FCEBEB; color: #A32D2D; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 1rem; display: none; }
    .loading { text-align: center; color: #888; font-size: 13px; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>Resume Analyzer</h1>
  <p class="sub">Upload a .txt or .pdf resume to get your skill match score + AI feedback</p>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".txt,.pdf" onchange="onFileSelect(event)" />
    <p class="upload-label">Drop your resume here or <span>browse</span></p>
    <p class="filename" id="fname"></p>
  </div>

  <button id="analyzeBtn" onclick="analyzeResume()" disabled>Analyze Resume</button>

  <div class="loading" id="loading">Analyzing with AI — this takes a few seconds...</div>
  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result">
    <div class="score-row">
      <div class="score-circle" id="scoreCircle"></div>
      <div>
        <div class="score-label" id="scoreLabel"></div>
        <div class="score-sub" id="scoreSub"></div>
      </div>
    </div>

    <div class="field"><span class="field-label">Email</span><span class="field-val" id="resEmail"></span></div>
    <div class="field"><span class="field-label">Phone</span><span class="field-val" id="resPhone"></span></div>
    <div class="field" style="border:none;"><span class="field-label">File</span><span class="field-val" id="resFile"></span></div>

    <p class="chip-label">Skills found</p>
    <div class="chips" id="skillsFound"></div>

    <p class="chip-label">Missing skills</p>
    <div class="chips" id="skillsMissing"></div>

    <div class="feedback-box">
      <div class="feedback-title">AI FEEDBACK</div>
      <div id="aiFeedback"></div>
    </div>
  </div>
</div>

<script>
  let selectedFile = null;

  function onFileSelect(e) {
    selectedFile = e.target.files[0];
    document.getElementById('fname').textContent = selectedFile ? selectedFile.name : '';
    document.getElementById('analyzeBtn').disabled = !selectedFile;
    document.getElementById('result').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
  }

  async function analyzeResume() {
    if (!selectedFile) return;

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = true;

    const formData = new FormData();
    formData.append('resume', selectedFile);

    try {
      const res = await fetch('http://localhost:5000/analyze', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      const score = data.score;
      const circle = document.getElementById('scoreCircle');
      circle.textContent = score + '%';
      circle.style.background = score >= 70 ? '#EAF3DE' : score >= 40 ? '#FAEEDA' : '#FCEBEB';
      circle.style.color      = score >= 70 ? '#3B6D11' : score >= 40 ? '#854F0B' : '#A32D2D';

      document.getElementById('scoreLabel').textContent = data.result;
      document.getElementById('scoreSub').textContent   = `${data.skills.length} of 7 required skills found`;
      document.getElementById('resEmail').textContent   = data.email;
      document.getElementById('resPhone').textContent   = data.phone;
      document.getElementById('resFile').textContent    = data.filename;
      document.getElementById('aiFeedback').textContent = data.feedback;

      document.getElementById('skillsFound').innerHTML =
        data.skills.map(s => `<span class="chip chip-found">${s}</span>`).join('') || '<span style="font-size:13px;color:#888;">None found</span>';

      document.getElementById('skillsMissing').innerHTML =
        data.missing.map(s => `<span class="chip chip-miss">${s}</span>`).join('') || '<span style="font-size:13px;color:#3B6D11;">All skills present!</span>';

      document.getElementById('result').style.display = 'block';

    } catch (err) {
      const eb = document.getElementById('errorBox');
      eb.textContent = 'Error: ' + err.message;
      eb.style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
    }
  }
</script>
</body>
</html>
